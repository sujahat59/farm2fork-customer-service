<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm2Fork — Account</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-group{margin-bottom:18px;}
    .addr-card{padding:16px;border-radius:14px;border:1.5px solid rgba(26,58,26,0.12);transition:all 0.2s;margin-bottom:12px;}
    .addr-card.default{border-color:#2d5a2d;background:rgba(45,90,45,0.04);}
    .danger-zone{background:rgba(165,42,42,0.05);border:2px solid rgba(165,42,42,0.2);border-radius:20px;padding:28px;margin-top:24px;}
  </style>
</head>
<body>
<div id="particles"></div>
<nav class="sidebar">
  <div class="farmer-wrap" id="farmerWrap"></div>
  <p class="sidebar-name" id="sidebarName"></p>
  <span class="role-badge">Customer</span>
  <div id="navLinks"></div>
  <button class="logout-btn" id="logoutBtn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</button>
</nav>
<main class="main">
  <h1 class="page-title">Account Settings</h1>
  <p class="page-sub">Manage your profile and delivery preferences</p>

  <div class="grid-2">
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#2d5a2d" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <h3 style="font-size:17px;font-weight:700;color:#1a3a1a;">Profile Information</h3>
      </div>
      <div class="form-group"><label>Full Name</label><input type="text" id="nameInput" placeholder="Your name"></div>
      <div class="form-group"><label>Email Address</label><input type="email" id="emailInput" placeholder="your@email.com"></div>
      <div class="form-group"><label>Phone Number</label><input type="text" id="phoneInput" placeholder="519-555-0100"></div>
      <button class="btn-primary" style="width:100%" id="saveBtn" onclick="saveProfile()">Save Changes</button>
      <p id="saveMsg" style="text-align:center;margin-top:10px;font-size:13px;display:none;color:#2d5a2d"></p>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#2d5a2d" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <h3 style="font-size:17px;font-weight:700;color:#1a3a1a;">Delivery Addresses</h3>
        </div>
        <button class="btn-secondary" onclick="toggleAddForm()">+ Add New</button>
      </div>
      <div id="addressList"><p style="color:#999;text-align:center;padding:20px">Loading...</p></div>
      <div id="addForm" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid rgba(26,58,26,0.1);">
        <div class="form-group"><label>Street</label><input type="text" id="newStreet" placeholder="123 Main St"></div>
        <div class="form-row">
          <div class="form-group"><label>City</label><input type="text" id="newCity" placeholder="Waterloo"></div>
          <div class="form-group"><label>Province</label><input type="text" id="newProvince" placeholder="ON" maxlength="2"></div>
        </div>
        <div class="form-group"><label>Postal Code</label><input type="text" id="newPostal" placeholder="N2L 3G1"></div>
        <button class="btn-primary" onclick="addAddress()">Save Address</button>
        <p id="addrMsg" style="font-size:13px;margin-top:8px;display:none;"></p>
      </div>
    </div>
  </div>

  <div class="danger-zone">
    <h2 style="font-size:20px;font-weight:700;color:#a52a2a;margin-bottom:8px;">Danger Zone</h2>
    <p style="color:#5a7a5a;margin-bottom:20px;">Once you delete your account, there is no going back. Please be certain.</p>
    <button class="btn-danger" onclick="deleteAccount()">Delete Account</button>
  </div>
</main>
<script src="js/shared.js"></script>
<script>
initSidebar('account.html');
let addresses = [];

async function load() {
  try {
    const res = await fetch(`${API}/customers/${user.id}`, {headers});
    const data = await res.json();
    document.getElementById('nameInput').value = data.name || '';
    document.getElementById('emailInput').value = data.email || '';
    document.getElementById('phoneInput').value = data.phone || '';
  } catch(e){}
  await loadAddresses();
}

async function loadAddresses() {
  try {
    const res = await fetch(`${API}/customers/${user.id}/addresses`, {headers});
    addresses = await res.json();
    renderAddresses();
  } catch(e){}
}

function renderAddresses() {
  const el = document.getElementById('addressList');
  if (!addresses.length) { el.innerHTML = '<p style="color:#999;text-align:center;padding:20px">No addresses yet</p>'; return; }
  el.innerHTML = addresses.map(a=>`
    <div class="addr-card ${a.isDefault?'default':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
            <span style="font-weight:600;color:#1a3a1a">${a.street}</span>
            ${a.isDefault?'<span class="pill pill-green">Default</span>':''}
          </div>
          <div style="font-size:13px;color:#5a7a5a">${a.city}, ${a.province} ${a.postalCode}</div>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0;">
          ${!a.isDefault?`<button class="btn-secondary" style="padding:6px 12px;font-size:12px" onclick="setDefault('${a.id}')">Set Default</button>`:''}
          <button onclick="deleteAddr('${a.id}')" style="width:34px;height:34px;border-radius:8px;border:none;background:rgba(165,42,42,0.08);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;" onmouseover="this.style.background='rgba(165,42,42,0.15)'" onmouseout="this.style.background='rgba(165,42,42,0.08)'">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#a52a2a" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </div>
    </div>`).join('');
}

async function saveProfile() {
  const name = document.getElementById('nameInput').value;
  const email = document.getElementById('emailInput').value;
  const phone = document.getElementById('phoneInput').value;
  try {
    const res = await fetch(`${API}/customers/${user.id}`, {method:'PATCH', headers, body:JSON.stringify({name,email,phone})});
    const msg = document.getElementById('saveMsg');
   if (res.ok) {
  msg.textContent = 'Saved successfully!';
  msg.style.color = '#2d5a2d';
  const updatedUser = {...user, name, email, phone};
  localStorage.setItem('user', JSON.stringify(updatedUser));
  user.name = name;
  document.getElementById('sidebarName').textContent = name;
}
    else { msg.textContent = 'Failed to save'; msg.style.color='#a52a2a'; }
    msg.style.display='block';
    setTimeout(()=>msg.style.display='none', 2500);
  } catch(e){}
}

function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.style.display = f.style.display==='none'?'block':'none';
}

async function addAddress() {
  const street=document.getElementById('newStreet').value,city=document.getElementById('newCity').value,province=document.getElementById('newProvince').value,postalCode=document.getElementById('newPostal').value;
  const msg = document.getElementById('addrMsg');
  try {
    const res = await fetch(`${API}/customers/${user.id}/addresses`, {method:'POST', headers, body:JSON.stringify({street,city,province,postalCode})});
    if (res.ok) { msg.textContent='Address added!'; msg.style.color='#2d5a2d'; msg.style.display='block'; await loadAddresses(); }
    else { const d=await res.json(); msg.textContent=d.error||'Failed'; msg.style.color='#a52a2a'; msg.style.display='block'; }
  } catch(e){}
}

async function setDefault(addressId) {
  try {
    await fetch(`${API}/customers/${user.id}/addresses/default`, {method:'PATCH', headers, body:JSON.stringify({addressId})});
    await loadAddresses();
  } catch(e){}
}

async function deleteAddr(id) {
  if (!confirm('Delete this address?')) return;
  try {
    await fetch(`${API}/addresses/${id}`, {method:'DELETE', headers});
    await loadAddresses();
  } catch(e){}
}

async function deleteAccount() {
  if (!confirm('Are you absolutely sure? This cannot be undone!')) return;
  try {
    await fetch(`${API}/customers/${user.id}`, {method:'DELETE', headers});
    localStorage.clear();
    window.location.href = 'login.html';
  } catch(e){}
}

load();
</script>
</body>
</html>
