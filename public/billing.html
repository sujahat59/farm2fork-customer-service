<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm2Fork — Billing</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:14px 20px;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#1a3a1a;background:rgba(26,58,26,0.05);border-bottom:1px solid rgba(26,58,26,0.1);}
    td{padding:14px 20px;border-bottom:1px solid rgba(26,58,26,0.05);color:#3a5a3a;font-size:14px;}
    tr:hover td{background:rgba(26,58,26,0.02);}
    tr:last-child td{border-bottom:none;}
  </style>
</head>
<body>
<div id="particles"></div>
<nav class="sidebar">
  <div class="farmer-wrap" id="farmerWrap"></div>
  <p class="sidebar-name" id="sidebarName"></p>
  <span class="role-badge">Customer</span>
  <div id="navLinks"></div>
  <button class="logout-btn" id="logoutBtn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</button>
</nav>
<main class="main">
  <h1 class="page-title">Billing History</h1>
  <p class="page-sub">View and manage your payment history</p>
  <div class="grid-2" style="margin-bottom:28px;">
    <div class="card"><div class="icon-box"><svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="stat-label">Total Spent</div><div class="stat-value" id="totalSpent">$0.00</div></div>
    <div class="card"><div class="icon-box"><svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div><div class="stat-label">Payments Made</div><div class="stat-value" id="totalPayments">0</div></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <table>
      <thead><tr><th>Invoice</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
      <tbody id="billingTable"><tr><td colspan="4" style="text-align:center;padding:40px;color:#999">Loading...</td></tr></tbody>
    </table>
  </div>
</main>
<script src="js/shared.js"></script>
<script>
initSidebar('billing.html');
async function load() {
  try {
    const [totRes, billRes] = await Promise.all([
      fetch(`${API}/customers/${user.id}/billing/total`, {headers}),
      fetch(`${API}/customers/${user.id}/billing`, {headers})
    ]);
    const tot = await totRes.json();
    const records = await billRes.json();
    document.getElementById('totalSpent').textContent = `$${(tot.totalSpent||0).toFixed(2)}`;
    document.getElementById('totalPayments').textContent = tot.totalPayments || 0;
    const pillClass = {paid:'pill-green',pending:'pill-amber',failed:'pill-red'};
    document.getElementById('billingTable').innerHTML = records.length
      ? records.map(r=>`<tr><td style="font-weight:600;color:#1a3a1a">${r.invoiceRef||'—'}</td><td>${new Date(r.createdAt).toLocaleDateString()}</td><td style="font-weight:600">$${r.amount.toFixed(2)}</td><td><span class="pill ${pillClass[r.status]||'pill-grey'}">${r.status}</span></td></tr>`).join('')
      : '<tr><td colspan="4" style="text-align:center;padding:40px;color:#999">No billing records yet</td></tr>';
  } catch(e){ document.getElementById('billingTable').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:#999">Failed to load</td></tr>'; }
}
load();
</script>
</body>
</html>
