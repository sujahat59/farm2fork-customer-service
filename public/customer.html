<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm2Fork — Dashboard</title>
  <link rel="stylesheet" href="css/shared.css">
</head>
<body>
<div id="particles"></div>
<nav class="sidebar">
  <div class="farmer-wrap" id="farmerWrap"></div>
  <p class="sidebar-name" id="sidebarName"></p>
  <span class="role-badge">Customer</span>
  <div id="navLinks"></div>
  <button class="logout-btn" id="logoutBtn">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    Logout
  </button>
</nav>
<main class="main">
  <h1 class="page-title" id="welcomeMsg">Welcome back!</h1>
  <p class="page-sub">Here's what's happening with your Farm2Fork subscription</p>
  <div class="grid-4" id="statsGrid">
    <div class="card"><div class="icon-box"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg></div><div class="stat-label">Active Subscription</div><div class="stat-value" id="statSub">—</div></div>
    <div class="card"><div class="icon-box"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg></div><div class="stat-label">Loyalty Points</div><div class="stat-value" id="statPoints">0</div></div>
    <div class="card"><div class="icon-box"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="stat-label">Total Spent</div><div class="stat-value" id="statSpent">$0.00</div></div>
    <div class="card"><div class="icon-box"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div><div class="stat-label">Next Billing</div><div class="stat-value" style="font-size:20px;" id="statNext">—</div></div>
  </div>

  <!-- Browse Products Banner -->
  <div style="margin-top:28px;background:linear-gradient(135deg,#1a3a1a,#2d5a2d);border-radius:20px;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(26,58,26,0.25);position:relative;overflow:hidden;">
    <div style="position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:rgba(255,255,255,0.05);border-radius:50%;"></div>
    <div style="position:absolute;bottom:-40px;left:200px;width:180px;height:180px;background:rgba(255,255,255,0.04);border-radius:50%;"></div>
    <div style="display:flex;align-items:center;gap:16px;position:relative;z-index:1;">
      <div style="width:56px;height:56px;background:rgba(255,255,255,0.12);border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#FFD700" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      </div>
      <div>
        <div style="color:white;font-size:20px;font-weight:700;margin-bottom:4px;">Explore Our Farm Boxes</div>
        <div style="color:rgba(255,255,255,0.65);font-size:14px;">Browse this week's fresh selection from local farms</div>
      </div>
    </div>
    <button onclick="goToProducts()" style="background:linear-gradient(135deg,#c9a227,#a8841f);color:#1a2e1a;border:none;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.25s;position:relative;z-index:1;flex-shrink:0;" onmouseover="this.style.boxShadow='0 6px 20px rgba(201,162,39,0.5)'" onmouseout="this.style.boxShadow='none'">
      Browse Products
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
    </button>
  </div>

</main>
<script src="js/shared.js"></script>
<script>
initSidebar('customer.html');
document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name || 'User'}!`;

async function load() {
  try {
    const res = await fetch(`${API}/customers/${user.id}`, {headers});
    const data = await res.json();
    if (data.subscriptions?.length > 0) {
      const sub = data.subscriptions[0];
      document.getElementById('statSub').textContent = `${sub.boxType} Box`;
    } else {
      document.getElementById('statSub').textContent = 'No subscription';
    }
  } catch(e){}
  try {
    const res = await fetch(`${API}/customers/${user.id}/loyalty`, {headers});
    const data = await res.json();
    document.getElementById('statPoints').textContent = data.pointsBalance?.toLocaleString() || '0';
  } catch(e){}
  try {
    const res = await fetch(`${API}/customers/${user.id}/billing/total`, {headers});
    const data = await res.json();
    document.getElementById('statSpent').textContent = `$${(data.totalSpent||0).toFixed(2)}`;
  } catch(e){}
  try {
    const res = await fetch(`${API}/customers/${user.id}/billing`, {headers});
    const records = await res.json();
    const active = records.find(r => r.status === 'pending');
    if (active) document.getElementById('statNext').textContent = new Date(active.createdAt).toLocaleDateString();
  } catch(e){}
}

function goToProducts() {
  // Replace with OO's actual URL when they confirm
  const OO_PRODUCTS_URL = 'https://forgotten-thats-fill-chairman.trycloudflare.com/products';
  window.location.href = OO_PRODUCTS_URL;
}

load();
</script>
</body>
</html>
