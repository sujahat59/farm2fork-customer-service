<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm2Fork — Login</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#e8f0e8 0%,#f5f1e8 50%,#e8ede8 100%);overflow:hidden;position:relative;}
    #particles{position:fixed;inset:0;pointer-events:none;z-index:0;}

    .card{position:relative;z-index:10;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.4);border-radius:28px;padding:32px 36px;width:420px;box-shadow:0 20px 60px rgba(61,90,61,0.15),0 0 0 1px rgba(255,255,255,0.3);overflow:hidden;}
    .card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(74,124,74,0.04) 0%,transparent 50%,rgba(219,184,77,0.04) 100%);pointer-events:none;}

    .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;}
    .brand-icon{width:40px;height:40px;background:linear-gradient(135deg,#3d5a3d,#4a7c4a);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(61,90,61,0.3);}
    .brand-name{font-size:22px;font-weight:700;color:#2d3b2d;letter-spacing:-0.3px;}
    .brand-sub{text-align:center;color:#5a6b5a;font-size:13px;margin-bottom:0;}

    .farmer-stage{display:flex;justify-content:center;margin:4px 0 8px;height:160px;}
    .farmer-stage svg{height:160px;width:auto;transition:all 0.5s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 8px 20px rgba(61,90,61,0.2));}
    .farmer-stage.success svg{animation:bounce 0.6s ease infinite alternate;}
    .farmer-stage.error svg{animation:shake 0.4s ease;}
    @keyframes bounce{0%{transform:translateY(0);}100%{transform:translateY(-12px);}}
    @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

    .field-label{display:block;font-size:12px;font-weight:600;color:#3d5a3d;margin-bottom:7px;letter-spacing:0.02em;}
    .fields{display:flex;flex-direction:column;gap:16px;margin-bottom:10px;}
    .field-wrap{position:relative;}
    .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#5a6b5a;pointer-events:none;}
    .field-wrap input{width:100%;padding:14px 14px 14px 44px;background:rgba(255,255,255,0.7);border:2px solid rgba(61,90,61,0.15);border-radius:14px;font-size:15px;color:#2d3b2d;outline:none;transition:all 0.25s;}
    .field-wrap input::placeholder{color:rgba(90,107,90,0.5);}
    .field-wrap input:focus{border-color:#4a7c4a;background:rgba(255,255,255,0.9);box-shadow:0 0 0 4px rgba(74,124,74,0.1);}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#5a6b5a;padding:4px;transition:color 0.2s;}
    .toggle-pw:hover{color:#3d5a3d;}
    .toggle-pw svg{width:18px;height:18px;}


    .btn{width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#3d5a3d,#4a7c4a,#3d5a3d);background-size:200% 100%;background-position:left;color:#f5f1e8;font-size:16px;font-weight:600;cursor:pointer;margin-top:20px;transition:all 0.4s;box-shadow:0 4px 20px rgba(61,90,61,0.3);position:relative;overflow:hidden;}
    .btn:hover{background-position:right;box-shadow:0 6px 28px rgba(61,90,61,0.4);}
    .btn:active{transform:scale(0.98);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .btn .shine{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);transition:transform 0.6s;}
    .btn:hover .shine{transform:translateX(100%);}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0 16px;}
    .divider-line{flex:1;height:1px;background:rgba(61,90,61,0.15);}
    .divider-text{font-size:13px;color:#5a6b5a;}

    .register-link{text-align:center;}
    .register-link a{display:inline-flex;align-items:center;gap:6px;color:#3d5a3d;font-weight:600;font-size:14px;text-decoration:none;transition:color 0.2s;}
    .register-link a:hover{color:#4a7c4a;}
    .register-link a svg{width:16px;height:16px;transition:transform 0.2s;}
    .register-link a:hover svg{transform:translateX(4px);}
    .register-link p{font-size:12px;color:#5a6b5a;margin-top:4px;}

    .msg{font-size:13px;text-align:center;padding:10px 14px;border-radius:10px;display:none;margin-top:12px;}
    .msg-error{background:rgba(199,80,80,0.1);color:#c75050;border:1px solid rgba(199,80,80,0.2);}
    .msg-success{background:rgba(74,124,74,0.1);color:#3d5a3d;border:1px solid rgba(74,124,74,0.2);}

    @keyframes float{0%,100%{transform:translateY(0) translateX(0) rotate(0deg);opacity:.25;}25%{transform:translateY(-30px) translateX(15px) rotate(5deg);opacity:.4;}50%{transform:translateY(-15px) translateX(-10px) rotate(-3deg);opacity:.3;}75%{transform:translateY(-40px) translateX(20px) rotate(8deg);opacity:.4;}}
  </style>
</head>
<body>

<div id="particles"></div>

<div class="card">

  <div class="brand">
    <div class="brand-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#f5f1e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.5 19 2c1 2 2 4.5 2 7A7 7 0 0 1 11 20z"/>
        <path d="M5 20c0-7 4-10 8-10"/>
      </svg>
    </div>
    <span class="brand-name">Farm2Fork</span>
  </div>
  <p class="brand-sub">Fresh from the field to your table</p>

  <div class="farmer-stage" id="farmerStage"></div>

  <form id="loginForm">
    <div class="fields">
      <div>
        <label class="field-label">Email Address</label>
        <div class="field-wrap">
          <svg class="field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <input type="email" id="email" placeholder="farmer@example.com" required>
        </div>
      </div>
      <div>
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <svg class="field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input type="password" id="password" placeholder="Enter your password" required style="padding-right:50px;">
          <button type="button" class="toggle-pw" id="togglePw">
            <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <button type="submit" class="btn" id="loginBtn"><span class="shine"></span><span id="btnText">Sign In to Your Garden</span></button>
    <p class="msg msg-error"   id="errorMsg"></p>
    <p class="msg msg-success" id="successMsg"></p>
  </form>

  <div class="divider"><div class="divider-line"></div><span class="divider-text">New to Farm2Fork?</span><div class="divider-line"></div></div>

  <div class="register-link">
    <a href="register.html">
      <span>Register here</span>
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </a>
    <p>Start your fresh produce journey today!</p>
  </div>

</div>

<script>
const API='http://159.203.16.186:3000';

// Floating particles
(function(){
  const wrap=document.getElementById('particles');
  for(let i=0;i<30;i++){
    const div=document.createElement('div');
    const sz=14+Math.random()*18,rot=Math.random()*360,type=Math.random()>.5?'wheat':'leaf';
    div.style.cssText=`position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:float ${14+Math.random()*18}s ease-in-out infinite;animation-delay:${Math.random()*-20}s;pointer-events:none;`;
    div.innerHTML=type==='wheat'
      ?`<svg width="${sz}" height="${sz*1.5}" viewBox="0 0 24 36" style="transform:rotate(${rot}deg)"><line x1="12" y1="36" x2="12" y2="8" stroke="#c9a227" stroke-width="2"/><ellipse cx="8" cy="8" rx="4" ry="6" fill="#dbb84d" opacity=".7"/><ellipse cx="16" cy="10" rx="4" ry="6" fill="#dbb84d" opacity=".7"/><ellipse cx="8" cy="16" rx="4" ry="6" fill="#dbb84d" opacity=".7"/><ellipse cx="16" cy="18" rx="4" ry="6" fill="#dbb84d" opacity=".7"/><ellipse cx="12" cy="4" rx="3" ry="5" fill="#dbb84d" opacity=".7"/></svg>`
      :`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" style="transform:rotate(${rot}deg)"><path d="M12 2C6 2 2 8 2 14C2 14 6 16 12 16C18 16 22 14 22 14C22 8 18 2 12 2Z" fill="#4a7c4a" opacity=".5"/><path d="M12 6V16" stroke="#3d5a3d" stroke-width="1.5" opacity=".4"/></svg>`;
    wrap.appendChild(div);
  }
})();

// Full farmer SVG from v0
function farmerSVG(state){
  const hatTY   = state==='success'?-8 : state==='error'?4  : 0;
  const bodyTY  = state==='success'?-12: state==='error'?8  : 0;
  const faceTY  = bodyTY;

  // Eyes
  let eyes='';
  if(state==='typing-password'){
    eyes=`
      <ellipse cx="82" cy="78" rx="18" ry="14" fill="#f5d0a9" stroke="#e8c090" stroke-width="1"/>
      <path d="M 68 75 Q 65 78 68 82" stroke="#e8c090" stroke-width="1" fill="none"/>
      <path d="M 73 73 Q 70 78 73 84" stroke="#e8c090" stroke-width="1" fill="none"/>
      <path d="M 78 72 Q 75 78 78 85" stroke="#e8c090" stroke-width="1" fill="none"/>
      <path d="M 83 73 Q 80 78 83 84" stroke="#e8c090" stroke-width="1" fill="none"/>
      <ellipse cx="118" cy="78" rx="18" ry="14" fill="#f5d0a9" stroke="#e8c090" stroke-width="1"/>
      <path d="M 132 75 Q 135 78 132 82" stroke="#e8c090" stroke-width="1" fill="none"/>
      <path d="M 127 73 Q 130 78 127 84" stroke="#e8c090" stroke-width="1" fill="none"/>
      <path d="M 122 72 Q 125 78 122 85" stroke="#e8c090" stroke-width="1" fill="none"/>
      <path d="M 117 73 Q 120 78 117 84" stroke="#e8c090" stroke-width="1" fill="none"/>`;
  } else {
    const eyeRY = state==='typing-email'?12: state==='error'?6:8;
    const eyeRX = state==='typing-email'?10:8;
    const pupilR= state==='typing-email'?5:4;
    const pupilY= state==='error'?76:75;
    const browL = state==='typing-email'?'M 75 62 Q 85 58 95 62': state==='error'?'M 75 65 Q 85 62 95 68':'M 75 65 Q 85 62 95 65';
    const browR = state==='typing-email'?'M 105 62 Q 115 58 125 62': state==='error'?'M 105 68 Q 115 62 125 65':'M 105 65 Q 115 62 125 65';
    eyes=`
      <ellipse cx="85" cy="75" rx="${eyeRX}" ry="${eyeRY}" fill="white"/>
      <ellipse cx="115" cy="75" rx="${eyeRX}" ry="${eyeRY}" fill="white"/>
      <circle cx="85" cy="${pupilY}" r="${pupilR}" fill="#3d2314"/>
      <circle cx="115" cy="${pupilY}" r="${pupilR}" fill="#3d2314"/>
      <circle cx="87" cy="73" r="2" fill="white" opacity="0.8"/>
      <circle cx="117" cy="73" r="2" fill="white" opacity="0.8"/>
      <path d="${browL}" stroke="#8b6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="${browR}" stroke="#8b6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  }

  // Mouth
  let mouth='';
  if(state==='success') mouth=`<path d="M 80 95 Q 100 115 120 95" stroke="#c75050" stroke-width="4" fill="none" stroke-linecap="round"/>`;
  else if(state==='error') mouth=`<path d="M 85 100 Q 100 92 115 100" stroke="#c75050" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  else if(state==='typing-email') mouth=`<ellipse cx="100" cy="97" rx="6" ry="8" fill="#c75050"/>`;
  else mouth=`<path d="M 85 95 Q 100 105 115 95" stroke="#c75050" stroke-width="3" fill="none" stroke-linecap="round"/>`;

  // Arms
  let arms='';
  if(state==='success'){
    arms=`<path d="M 65 110 Q 40 80 35 55" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>
          <path d="M 135 110 Q 160 80 165 55" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>
          <circle cx="35" cy="50" r="10" fill="#f5d0a9"/>
          <circle cx="165" cy="50" r="10" fill="#f5d0a9"/>`;
  } else if(state==='typing-password'){
    arms=`<path d="M 65 110 Q 55 95 70 78" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>
          <path d="M 135 110 Q 145 95 130 78" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>`;
  } else if(state==='error'){
    arms=`<path d="M 65 110 Q 45 130 40 155" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>
          <path d="M 135 110 Q 155 130 160 155" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>
          <circle cx="40" cy="158" r="10" fill="#f5d0a9"/>
          <circle cx="160" cy="158" r="10" fill="#f5d0a9"/>
          <ellipse cx="140" cy="68" rx="4" ry="6" fill="#87ceeb" opacity="0.8"/>`;
  } else {
    arms=`<path d="M 65 110 Q 50 125 45 145" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>
          <path d="M 135 110 Q 150 125 155 145" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>
          <circle cx="45" cy="148" r="10" fill="#f5d0a9"/>
          <circle cx="155" cy="148" r="10" fill="#f5d0a9"/>`;
  }

  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(0,${hatTY})">
      <ellipse cx="100" cy="58" rx="50" ry="8" fill="#8b6b4a"/>
      <path d="M 60 58 Q 60 30 100 25 Q 140 30 140 58" fill="#a67c52" stroke="#8b6b4a" stroke-width="2"/>
      <rect x="65" y="48" width="70" height="8" fill="#3d5a3d" rx="2"/>
      <g transform="translate(120,35) rotate(20)">
        <line x1="0" y1="0" x2="0" y2="20" stroke="#c9a227" stroke-width="2"/>
        <ellipse cx="-3" cy="2" rx="3" ry="5" fill="#dbb84d"/>
        <ellipse cx="3" cy="4" rx="3" ry="5" fill="#dbb84d"/>
        <ellipse cx="-2" cy="8" rx="3" ry="5" fill="#dbb84d"/>
        <ellipse cx="2" cy="10" rx="3" ry="5" fill="#dbb84d"/>
      </g>
    </g>
    <g transform="translate(0,${bodyTY})">
      <path d="M 75 130 L 80 100 M 125 130 L 120 100" stroke="#4a7c4a" stroke-width="6" stroke-linecap="round"/>
      <path d="M 70 100 Q 60 140 70 170 L 90 170 L 90 145 L 110 145 L 110 170 L 130 170 Q 140 140 130 100 Z" fill="#4a7c4a"/>
      <ellipse cx="100" cy="105" rx="25" ry="15" fill="#e8d5b5"/>
      <circle cx="80" cy="115" r="4" fill="#dbb84d"/>
      <circle cx="120" cy="115" r="4" fill="#dbb84d"/>
      <rect x="90" y="130" width="20" height="12" rx="2" fill="#3d5a3d"/>
    </g>
    ${arms}
    <g transform="translate(0,${faceTY})">
      <ellipse cx="100" cy="78" rx="35" ry="30" fill="#f5d0a9"/>
      <ellipse cx="72" cy="85" rx="8" ry="5" fill="#f0b8b8" opacity="0.6"/>
      <ellipse cx="128" cy="85" rx="8" ry="5" fill="#f0b8b8" opacity="0.6"/>
      ${eyes}
      <ellipse cx="100" cy="85" rx="5" ry="4" fill="#e8c090"/>
      ${mouth}
    </g>
  </svg>`;
}

const stage=document.getElementById('farmerStage');
let cur='normal';
function setF(s){
  cur=s;
  stage.innerHTML=farmerSVG(s);
  stage.className='farmer-stage '+s;
}
setF('normal');

const emailEl=document.getElementById('email');
const passEl=document.getElementById('password');
const toggleBtn=document.getElementById('togglePw');
const eyeIcon=document.getElementById('eyeIcon');

emailEl.addEventListener('focus',()=>setF('typing-email'));
emailEl.addEventListener('blur', ()=>setF('normal'));
emailEl.addEventListener('input',()=>setF('typing-email'));
passEl.addEventListener('focus', ()=>setF('typing-password'));
passEl.addEventListener('blur',  ()=>setF('normal'));
passEl.addEventListener('input', ()=>setF('typing-password'));

toggleBtn.addEventListener('click',()=>{
  const show=passEl.type==='password';
  passEl.type=show?'text':'password';
  eyeIcon.innerHTML=show
    ?`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`
    :`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
  setF(show?'normal':'typing-password');
});

document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const email=emailEl.value.trim(),password=passEl.value.trim();
  const errEl=document.getElementById('errorMsg'),sucEl=document.getElementById('successMsg');
  const btn=document.getElementById('loginBtn'),btnText=document.getElementById('btnText');
  errEl.style.display='none';sucEl.style.display='none';
  btnText.textContent='Signing in...';btn.disabled=true;setF('normal');
  try{
    const res=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(res.ok){
      setF('success');
      localStorage.setItem('token',data.token);localStorage.setItem('user',JSON.stringify(data.user));
      sucEl.textContent='Welcome back! Redirecting...';sucEl.style.display='block';
      setTimeout(()=>window.location.href=data.role==='driver'?`driver.html?token=${data.token}`:'customer.html',1000);
    } else {
      setF('error');errEl.textContent=data.error||'Invalid credentials';errEl.style.display='block';
      setTimeout(()=>setF('normal'),2200);
    }
  }catch{
    setF('error');errEl.textContent='Cannot connect to server';errEl.style.display='block';
    setTimeout(()=>setF('normal'),2200);
  }finally{btnText.textContent='Sign In to Your Garden';btn.disabled=false;}
});
</script>
</body>
</html>
