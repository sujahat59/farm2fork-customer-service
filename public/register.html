<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm2Fork — Register</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#e8f0e8 0%,#f5f1e8 50%,#e8ede8 100%);overflow:hidden;position:relative;}
    #particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .card{position:relative;z-index:10;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.4);border-radius:28px;padding:32px 36px;width:420px;box-shadow:0 20px 60px rgba(61,90,61,0.15);overflow:hidden;}
    .card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(74,124,74,0.04),transparent 50%,rgba(219,184,77,0.04));pointer-events:none;}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;}
    .brand-icon{width:36px;height:36px;background:linear-gradient(135deg,#3d5a3d,#4a7c4a);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(61,90,61,0.3);}
    .brand-name{font-size:20px;font-weight:700;color:#2d3b2d;}
    .brand-sub{text-align:center;color:#5a6b5a;font-size:12px;margin-bottom:8px;}
    .farmer-stage{display:flex;justify-content:center;margin:0 0 8px;height:120px;}
    .farmer-stage svg{height:120px;width:auto;filter:drop-shadow(0 6px 16px rgba(61,90,61,0.2));transition:all 0.5s cubic-bezier(.34,1.56,.64,1);}
    .farmer-stage.success svg{animation:bounce 0.6s ease infinite alternate;}
    @keyframes bounce{0%{transform:translateY(0);}100%{transform:translateY(-10px);}}
    .fields{display:flex;flex-direction:column;gap:13px;}
    .field-label{display:block;font-size:12px;font-weight:600;color:#3d5a3d;margin-bottom:6px;}
    .field-wrap{position:relative;}
    .field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:#5a6b5a;pointer-events:none;}
    .field-wrap input{width:100%;padding:13px 13px 13px 42px;background:rgba(255,255,255,0.7);border:2px solid rgba(61,90,61,0.15);border-radius:12px;font-size:15px;color:#2d3b2d;outline:none;transition:all 0.25s;}
    .field-wrap input::placeholder{color:rgba(90,107,90,0.5);}
    .field-wrap input:focus{border-color:#4a7c4a;background:rgba(255,255,255,0.9);box-shadow:0 0 0 4px rgba(74,124,74,0.1);}
    .btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#3d5a3d,#4a7c4a,#3d5a3d);background-size:200% 100%;background-position:left;color:#f5f1e8;font-size:16px;font-weight:600;cursor:pointer;margin-top:18px;transition:all 0.4s;box-shadow:0 4px 20px rgba(61,90,61,0.3);position:relative;overflow:hidden;}
    .btn:hover{background-position:right;box-shadow:0 6px 28px rgba(61,90,61,0.4);}
    .btn:active{transform:scale(0.98);}
    .btn:disabled{opacity:0.6;cursor:not-allowed;}
    .btn .shine{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);transition:transform 0.6s;}
    .btn:hover .shine{transform:translateX(100%);}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0 14px;}
    .divider-line{flex:1;height:1px;background:rgba(61,90,61,0.15);}
    .divider-text{font-size:12px;color:#5a6b5a;}
    .login-link{text-align:center;}
    .login-link a{display:inline-flex;align-items:center;gap:6px;color:#3d5a3d;font-weight:600;font-size:14px;text-decoration:none;transition:color 0.2s;}
    .login-link a:hover{color:#4a7c4a;}
    .login-link a svg{width:15px;height:15px;transition:transform 0.2s;}
    .login-link a:hover svg{transform:translateX(4px);}
    .msg{font-size:13px;text-align:center;padding:10px 14px;border-radius:10px;display:none;margin-top:12px;}
    .msg-error{background:rgba(199,80,80,0.1);color:#c75050;border:1px solid rgba(199,80,80,0.2);}
    .msg-success{background:rgba(74,124,74,0.1);color:#3d5a3d;border:1px solid rgba(74,124,74,0.2);}
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg);opacity:.25;}50%{transform:translateY(-30px) rotate(5deg);opacity:.4;}}
  </style>
</head>
<body>
<div id="particles"></div>
<div class="card">
  <div class="brand">
    <div class="brand-icon"><svg width="20" height="22" viewBox="0 0 24 36"><line x1="12" y1="36" x2="12" y2="8" stroke="#f5f1e8" stroke-width="2"/><ellipse cx="8" cy="8" rx="4" ry="6" fill="#dbb84d"/><ellipse cx="16" cy="10" rx="4" ry="6" fill="#dbb84d"/><ellipse cx="8" cy="16" rx="4" ry="6" fill="#dbb84d"/><ellipse cx="16" cy="18" rx="4" ry="6" fill="#dbb84d"/><ellipse cx="12" cy="4" rx="3" ry="5" fill="#dbb84d"/></svg></div>
    <span class="brand-name">Farm2Fork</span>
  </div>
  <p class="brand-sub">Fresh from the field to your table</p>
  <div class="farmer-stage" id="farmerStage"></div>
  <form id="registerForm">
    <div class="fields">
      <div><label class="field-label">Full Name</label><div class="field-wrap"><svg class="field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><input type="text" id="name" placeholder="Your name" required></div></div>
      <div><label class="field-label">Email Address</label><div class="field-wrap"><svg class="field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><input type="email" id="email" placeholder="farmer@example.com" required></div></div>
      <div><label class="field-label">Phone <span style="font-weight:400;opacity:0.6">(optional)</span></label><div class="field-wrap"><svg class="field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg><input type="text" id="phone" placeholder="519-555-0100"></div></div>
      <div><label class="field-label">Password</label><div class="field-wrap"><svg class="field-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg><input type="password" id="password" placeholder="Choose a password" required></div></div>
    </div>
    <button type="submit" class="btn" id="registerBtn"><span class="shine"></span><span id="btnText">Create Account</span></button>
    <p class="msg msg-error"   id="errorMsg"></p>
    <p class="msg msg-success" id="successMsg"></p>
  </form>
  <div class="divider"><div class="divider-line"></div><span class="divider-text">Already have an account?</span><div class="divider-line"></div></div>
  <div class="login-link"><a href="login.html"><span>Login here</span><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></a></div>
</div>
<script>
const API='http://localhost:3000';
(function(){
  const wrap=document.getElementById('particles');
  for(let i=0;i<28;i++){
    const div=document.createElement('div'),sz=14+Math.random()*16,rot=Math.random()*360,type=Math.random()>.5?'w':'l';
    div.style.cssText=`position:absolute;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:float ${14+Math.random()*18}s ease-in-out infinite;animation-delay:${Math.random()*-20}s;pointer-events:none;`;
    div.innerHTML=type==='w'
      ?`<svg width="${sz}" height="${sz*1.5}" viewBox="0 0 24 36" style="transform:rotate(${rot}deg)"><line x1="12" y1="36" x2="12" y2="8" stroke="#c9a227" stroke-width="2"/><ellipse cx="8" cy="8" rx="4" ry="6" fill="#dbb84d" opacity=".6"/><ellipse cx="16" cy="10" rx="4" ry="6" fill="#dbb84d" opacity=".6"/><ellipse cx="8" cy="16" rx="4" ry="6" fill="#dbb84d" opacity=".6"/><ellipse cx="16" cy="18" rx="4" ry="6" fill="#dbb84d" opacity=".6"/><ellipse cx="12" cy="4" rx="3" ry="5" fill="#dbb84d" opacity=".6"/></svg>`
      :`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" style="transform:rotate(${rot}deg)"><path d="M12 2C6 2 2 8 2 14C2 14 6 16 12 16C18 16 22 14 22 14C22 8 18 2 12 2Z" fill="#4a7c4a" opacity=".4"/><path d="M12 6V16" stroke="#3d5a3d" stroke-width="1.5" opacity=".35"/></svg>`;
    wrap.appendChild(div);
  }
})();

function farmerSVG(state){
  const hatTY=state==='success'?-8:0,bodyTY=state==='success'?-12:0;
  let eyes='',mouth='',arms='';
  if(state==='typing-password'){
    eyes=`<ellipse cx="82" cy="78" rx="18" ry="14" fill="#f5d0a9" stroke="#e8c090" stroke-width="1"/><path d="M 68 75 Q 65 78 68 82" stroke="#e8c090" stroke-width="1" fill="none"/><path d="M 78 72 Q 75 78 78 85" stroke="#e8c090" stroke-width="1" fill="none"/><ellipse cx="118" cy="78" rx="18" ry="14" fill="#f5d0a9" stroke="#e8c090" stroke-width="1"/><path d="M 132 75 Q 135 78 132 82" stroke="#e8c090" stroke-width="1" fill="none"/><path d="M 122 72 Q 125 78 122 85" stroke="#e8c090" stroke-width="1" fill="none"/>`;
    arms=`<path d="M 65 110 Q 55 95 70 78" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/><path d="M 135 110 Q 145 95 130 78" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/>`;
  } else {
    const ry=state==='typing-email'?12:8,rx=state==='typing-email'?10:8,pr=state==='typing-email'?5:4;
    eyes=`<ellipse cx="85" cy="75" rx="${rx}" ry="${ry}" fill="white"/><ellipse cx="115" cy="75" rx="${rx}" ry="${ry}" fill="white"/><circle cx="85" cy="75" r="${pr}" fill="#3d2314"/><circle cx="115" cy="75" r="${pr}" fill="#3d2314"/><circle cx="87" cy="73" r="2" fill="white" opacity="0.8"/><circle cx="117" cy="73" r="2" fill="white" opacity="0.8"/>`;
    if(state==='typing-email') eyes+=`<path d="M 75 62 Q 85 58 95 62" stroke="#8b6b4a" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M 105 62 Q 115 58 125 62" stroke="#8b6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    else eyes+=`<path d="M 75 65 Q 85 62 95 65" stroke="#8b6b4a" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M 105 65 Q 115 62 125 65" stroke="#8b6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
    arms=`<path d="M 65 110 Q 50 125 45 145" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/><path d="M 135 110 Q 150 125 155 145" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/><circle cx="45" cy="148" r="10" fill="#f5d0a9"/><circle cx="155" cy="148" r="10" fill="#f5d0a9"/>`;
  }
  if(state==='success'){mouth=`<path d="M 80 95 Q 100 115 120 95" stroke="#c75050" stroke-width="4" fill="none" stroke-linecap="round"/>`;arms=`<path d="M 65 110 Q 40 80 35 55" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/><path d="M 135 110 Q 160 80 165 55" stroke="#f5d0a9" stroke-width="12" fill="none" stroke-linecap="round"/><circle cx="35" cy="50" r="10" fill="#f5d0a9"/><circle cx="165" cy="50" r="10" fill="#f5d0a9"/>`;}
  else if(state==='typing-email') mouth=`<ellipse cx="100" cy="97" rx="6" ry="8" fill="#c75050"/>`;
  else mouth=`<path d="M 85 95 Q 100 105 115 95" stroke="#c75050" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(0,${hatTY})"><ellipse cx="100" cy="58" rx="50" ry="8" fill="#8b6b4a"/><path d="M 60 58 Q 60 30 100 25 Q 140 30 140 58" fill="#a67c52" stroke="#8b6b4a" stroke-width="2"/><rect x="65" y="48" width="70" height="8" fill="#3d5a3d" rx="2"/><g transform="translate(120,35) rotate(20)"><line x1="0" y1="0" x2="0" y2="20" stroke="#c9a227" stroke-width="2"/><ellipse cx="-3" cy="2" rx="3" ry="5" fill="#dbb84d"/><ellipse cx="3" cy="4" rx="3" ry="5" fill="#dbb84d"/></g></g>
    <g transform="translate(0,${bodyTY})"><path d="M 75 130 L 80 100 M 125 130 L 120 100" stroke="#4a7c4a" stroke-width="6" stroke-linecap="round"/><path d="M 70 100 Q 60 140 70 170 L 90 170 L 90 145 L 110 145 L 110 170 L 130 170 Q 140 140 130 100 Z" fill="#4a7c4a"/><ellipse cx="100" cy="105" rx="25" ry="15" fill="#e8d5b5"/><circle cx="80" cy="115" r="4" fill="#dbb84d"/><circle cx="120" cy="115" r="4" fill="#dbb84d"/></g>
    ${arms}
    <g transform="translate(0,${bodyTY})"><ellipse cx="100" cy="78" rx="35" ry="30" fill="#f5d0a9"/><ellipse cx="72" cy="85" rx="8" ry="5" fill="#f0b8b8" opacity="0.6"/><ellipse cx="128" cy="85" rx="8" ry="5" fill="#f0b8b8" opacity="0.6"/>${eyes}<ellipse cx="100" cy="85" rx="5" ry="4" fill="#e8c090"/>${mouth}</g>
  </svg>`;
}
const stage=document.getElementById('farmerStage');let cur='normal';
function setF(s){cur=s;stage.innerHTML=farmerSVG(s);stage.className='farmer-stage '+s;}
setF('normal');
['name','email','phone'].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.addEventListener('focus',()=>setF('typing-email'));el.addEventListener('blur',()=>setF('normal'));el.addEventListener('input',()=>setF('typing-email'));});
const pw=document.getElementById('password');pw.addEventListener('focus',()=>setF('typing-password'));pw.addEventListener('blur',()=>setF('normal'));pw.addEventListener('input',()=>setF('typing-password'));
document.getElementById('registerForm').addEventListener('submit',async function(e){
  e.preventDefault();
  const name=document.getElementById('name').value.trim(),email=document.getElementById('email').value.trim(),phone=document.getElementById('phone').value.trim(),password=pw.value.trim();
  const errEl=document.getElementById('errorMsg'),sucEl=document.getElementById('successMsg'),btn=document.getElementById('registerBtn'),btnText=document.getElementById('btnText');
  errEl.style.display='none';sucEl.style.display='none';btnText.textContent='Creating...';btn.disabled=true;setF('typing-email');
  try{
    const res=await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,phone,password})});
    const data=await res.json();
    if(res.ok){setF('success');sucEl.textContent='Welcome to Farm2Fork! Redirecting...';sucEl.style.display='block';setTimeout(()=>window.location.href='login.html',1400);}
    else{setF('normal');errEl.textContent=data.error||'Registration failed';errEl.style.display='block';}
  }catch{setF('normal');errEl.textContent='Cannot connect to server';errEl.style.display='block';}
  finally{btnText.textContent='Create Account';btn.disabled=false;}
});
</script>
</body>
</html>
