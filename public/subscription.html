<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farm2Fork — Subscription</title>
  <link rel="stylesheet" href="css/shared.css">
  <style>
    .period-toggle{display:flex;background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);border-radius:50px;padding:6px;border:1px solid rgba(255,255,255,0.5);gap:4px;width:fit-content;margin:0 auto 32px;}
    .period-btn{padding:10px 24px;border-radius:50px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.25s;background:transparent;color:#5a7a5a;}
    .period-btn.active{background:linear-gradient(135deg,#2d5a2d,#3d7a3d);color:white;box-shadow:0 4px 12px rgba(45,90,45,0.3);}
    .plan-card{background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);border-radius:20px;padding:28px;border:1.5px solid rgba(255,255,255,0.5);transition:all 0.3s;position:relative;display:flex;flex-direction:column;}
    .plan-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(26,58,26,0.18);}
    .plan-card.popular{border-color:#2d5a2d;border-width:2px;}
    .popular-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#2d5a2d,#3d7a3d);color:white;padding:4px 20px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
    .plan-icon{text-align:center;margin-bottom:16px;}
    .plan-name{font-size:20px;font-weight:700;color:#1a3a1a;text-align:center;margin-bottom:4px;}
    .plan-desc{color:#5a7a5a;font-size:13px;text-align:center;margin-bottom:20px;}
    .plan-price{font-size:40px;font-weight:800;color:#1a3a1a;text-align:center;}
    .plan-period{font-size:14px;color:#5a7a5a;}
    .plan-features{list-style:none;margin:20px 0;flex:1;}
    .plan-features li{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(26,58,26,0.06);color:#3a5a3a;font-size:14px;}
    .plan-features li:last-child{border-bottom:none;}
    .check-icon{width:20px;height:20px;background:rgba(45,90,45,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .save-badge{background:#FFD700;color:#1a3a1a;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}
    .current-plan-card{background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);border-radius:20px;padding:24px;border:2px solid #2d5a2d;margin-bottom:28px;display:flex;align-items:center;gap:16px;}
    .checking-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
    .checking-box{background:white;border-radius:16px;padding:32px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
    .spinner{width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:#2d5a2d;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div id="particles"></div>

<!-- Checking availability overlay -->
<div class="checking-overlay" id="checkingOverlay" style="display:none;">
  <div class="checking-box">
    <div class="spinner"></div>
    <div style="font-size:16px;font-weight:600;color:#1a3a1a;" id="checkingMsg">Checking availability...</div>
  </div>
</div>

<nav class="sidebar">
  <div class="farmer-wrap" id="farmerWrap"></div>
  <p class="sidebar-name" id="sidebarName"></p>
  <span class="role-badge">Customer</span>
  <div id="navLinks"></div>
  <button class="logout-btn" id="logoutBtn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Logout</button>
</nav>
<main class="main">
  <h1 class="page-title">Subscription Plans</h1>
  <p class="page-sub">Choose the perfect Farm Box for your needs</p>

  <div id="currentPlanWrap"></div>

  <div class="period-toggle" id="periodToggle">
    <button class="period-btn active" data-period="weekly">Weekly</button>
    <button class="period-btn" data-period="monthly">Monthly</button>
    <button class="period-btn" data-period="yearly">Yearly <span class="save-badge">Save 15%</span></button>
  </div>

  <div class="grid-3" id="plansGrid"></div>
</main>
<script src="js/shared.js"></script>
<script>
initSidebar('subscription.html');
let period = 'weekly';
let currentSub = null;
let currentUserId = user.id;

// Replace with OO's actual URL when they confirm
const OO_URL = 'https://forgotten-thats-fill-chairman.trycloudflare.com';

const plans = [
  { id:'fruit', name:'Fruit Box', desc:'Random seasonal fruits delivered fresh', icon:`<svg viewBox="0 0 80 80" width="80" height="80"><circle cx="40" cy="50" r="25" fill="#90EE90"/><ellipse cx="40" cy="30" rx="8" ry="15" fill="#228B22"/><path d="M40 15 Q45 25 40 35 Q35 25 40 15" fill="#32CD32"/></svg>`, prices:{weekly:29.99,monthly:109.99,yearly:1199.99}, features:['3–4 seasonal fruits','Random mix each week','Freshly sourced','Weekly delivery'] },
  { id:'veggie', name:'Veggie Box', desc:'Fresh vegetables straight from local farms', icon:`<svg viewBox="0 0 80 80" width="80" height="80"><ellipse cx="40" cy="55" rx="30" ry="15" fill="#8B4513"/><circle cx="25" cy="45" r="12" fill="#FF6347"/><circle cx="40" cy="40" r="10" fill="#FFD700"/><circle cx="55" cy="45" r="11" fill="#FF4500"/><circle cx="33" cy="35" r="8" fill="#32CD32"/><circle cx="48" cy="33" r="9" fill="#9ACD32"/></svg>`, prices:{weekly:27.99,monthly:99.99,yearly:1099.99}, features:['5–7 seasonal vegetables','Locally sourced','Recipe cards included','Weekly delivery'], popular:true },
  { id:'meat', name:'Meat Box', desc:'Premium quality meats and proteins', icon:`<svg viewBox="0 0 80 80" width="80" height="80"><rect x="15" y="40" width="50" height="30" rx="3" fill="#DEB887"/><rect x="15" y="35" width="50" height="10" fill="#D2691E"/><circle cx="25" cy="30" r="8" fill="#FF6347"/><circle cx="55" cy="30" r="7" fill="#CD853F"/></svg>`, prices:{weekly:49.99,monthly:179.99,yearly:1999.99}, features:['Premium cuts','Ethically sourced','Vacuum sealed','Weekly delivery'] },
];

function showOverlay(msg) {
  document.getElementById('checkingMsg').textContent = msg;
  document.getElementById('checkingOverlay').style.display = 'flex';
}
function hideOverlay() {
  document.getElementById('checkingOverlay').style.display = 'none';
}

function renderPlans() {
  document.getElementById('plansGrid').innerHTML = plans.map(p => `
    <div class="plan-card ${p.popular?'popular':''}">
      ${p.popular?'<div class="popular-badge">Most Popular</div>':''}
      <div class="plan-icon">${p.icon}</div>
      <div class="plan-name">${p.name}</div>
      <div class="plan-desc">${p.desc}</div>
      <div class="plan-price">$${p.prices[period].toFixed(2)}<span class="plan-period">/${period==='weekly'?'wk':period==='monthly'?'mo':'yr'}</span></div>
      <ul class="plan-features">${p.features.map(f=>`<li><div class="check-icon"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="#2d5a2d" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>${f}</li>`).join('')}</ul>
      <button class="btn-primary" style="width:100%;margin-top:auto;" onclick="subscribe('${p.id}','${period}')">${currentSub&&currentSub.boxType===p.id?'Current Plan':'Subscribe'}</button>
    </div>`).join('');
}

document.getElementById('periodToggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-period]');
  if (!btn) return;
  period = btn.dataset.period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.period===period));
  renderPlans();
});

async function subscribe(boxType, planDuration) {
  if (!currentUserId) return;

  showOverlay('Checking availability...');

  // Check with OO /has first — graceful fallback if OO not ready
  try {
    const hasRes = await fetch(`${OO_URL}/has?boxType=${boxType}`);
    if (hasRes.ok) {
      const hasData = await hasRes.json();
      if (!hasData.available) {
        hideOverlay();
        alert(`Sorry! ${boxType} box is not available right now. Please try again later.`);
        return;
      }
    }
    // If OO is down or endpoint not ready — proceed anyway
  } catch(e) {
    console.log('OO /has check skipped — OO not ready yet, proceeding anyway');
  }

  showOverlay('Creating your subscription...');

  try {
    const res = await fetch(`${API}/customers/${currentUserId}/subscriptions`, {
      method:'POST', headers,
      body: JSON.stringify({planType:'standard', boxType, planDuration})
    });
    const data = await res.json();
    hideOverlay();
    if (res.ok) { alert('Subscription created!'); location.reload(); }
    else alert(data.error || 'Failed to create subscription');
  } catch(e) {
    hideOverlay();
    alert('Cannot connect to server');
  }
}

async function load() {
  try {
    const res = await fetch(`${API}/customers/${user.id}`, {headers});
    const data = await res.json();
    if (data.subscriptions?.length > 0) {
      const subId = data.subscriptions[0].id;
      const sres = await fetch(`${API}/subscriptions/${subId}`, {headers});
      currentSub = await sres.json();
      document.getElementById('currentPlanWrap').innerHTML = `
  <div class="current-plan-card">
    <div class="icon-box" style="margin:0;flex-shrink:0"><svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
    <div style="flex:1"><div style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#5a7a5a">Current Plan</div><div style="font-size:18px;font-weight:700;color:#1a3a1a">${currentSub.boxType?.charAt(0).toUpperCase()+currentSub.boxType?.slice(1)} Box — ${currentSub.planDuration}</div></div>
    <div style="text-align:right"><div style="font-size:22px;font-weight:700;color:#2d5a2d">$${currentSub.billingRecords?.[0]?.amount?.toFixed(2)||'—'}/cycle</div><div style="font-size:13px;color:#5a7a5a">Next: ${currentSub.nextBillingDate?new Date(currentSub.nextBillingDate).toLocaleDateString():'—'}</div></div>
    <span class="pill pill-green" style="flex-shrink:0">${currentSub.status}</span>
    <button onclick="cancelSubscription('${currentSub.id}')" style="background:rgba(165,42,42,0.1);color:#a52a2a;border:none;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;">Cancel</button>
  </div>`;
    }
  } catch(e){}
  renderPlans();
}

async function cancelSubscription(subId) {
  if (!confirm('Are you sure you want to cancel your subscription?')) return;
  try {
    const res = await fetch(`${API}/subscriptions/${subId}/status`, {
      method: 'PATCH', headers,
      body: JSON.stringify({ status: 'cancelled' })
    });
    if (res.ok) { alert('Subscription cancelled.'); location.reload(); }
    else alert('Failed to cancel');
  } catch(e) { alert('Cannot connect to server'); }
}

load();
</script>
</body>
</html>
